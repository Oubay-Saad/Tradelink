<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeLink Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; background: #f5f5f5; color: #111; height: 100vh; overflow: hidden; display: flex; }
#login-view { width: 100%; display: flex; align-items: center; justify-content: center; }
.login-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 2rem; width: 340px; }
.login-card h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; color: #111; }
.login-card h1 span { color: #2563eb; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: .75rem; font-weight: 500; color: #666; margin-bottom: .35rem; }
.field input { width: 100%; padding: .55rem .8rem; border: 1px solid #ddd; border-radius: 6px; font-size: .9rem; outline: none; transition: border-color .15s; }
.field input:focus { border-color: #2563eb; }
#login-err { color: #dc2626; font-size: .8rem; margin-top: .6rem; display: none; }
#app { display: none; width: 100%; }
.sidebar { width: 180px; flex-shrink: 0; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; padding: 1rem 0; }
.sidebar-logo { padding: .5rem 1rem 1rem; font-size: .9rem; font-weight: 700; color: #2563eb; border-bottom: 1px solid #e0e0e0; margin-bottom: .5rem; }
.nav-item { display: flex; align-items: center; justify-content: space-between; padding: .5rem 1rem; cursor: pointer; color: #555; font-size: .85rem; transition: background .1s; }
.nav-item:hover { background: #f0f0f0; color: #111; }
.nav-item.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
.nav-badge { background: #e5e7eb; color: #555; font-size: .7rem; padding: 1px 6px; border-radius: 99px; }
.nav-item.active .nav-badge { background: #dbeafe; color: #2563eb; }
.sidebar-bottom { margin-top: auto; padding: .75rem 1rem; border-top: 1px solid #e0e0e0; }
.admin-name { font-size: .8rem; font-weight: 600; }
.admin-role { font-size: .7rem; color: #888; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: .75rem 1.25rem; display: flex; align-items: center; justify-content: space-between; }
.topbar-title { font-size: .95rem; font-weight: 700; }
.topbar-actions { display: flex; gap: .5rem; align-items: center; }
.content { flex: 1; overflow-y: auto; padding: 1.25rem; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
.btn { padding: .45rem .9rem; border: 1px solid transparent; border-radius: 6px; font-size: .82rem; font-weight: 500; cursor: pointer; transition: all .12s; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: #fff; border-color: #ddd; color: #444; }
.btn-ghost:hover { border-color: #999; }
.btn-full { width: 100%; padding: .65rem; font-size: .9rem; }
.table-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
.table-header { padding: .75rem 1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e0e0e0; }
.record-count { font-size: .8rem; color: #888; }
.search-box { display: flex; align-items: center; gap: .4rem; border: 1px solid #ddd; border-radius: 6px; padding: .3rem .7rem; }
.search-box input { border: none; outline: none; font-size: .82rem; color: #111; width: 150px; background: transparent; }
.search-box input::placeholder { color: #aaa; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { background: #fafafa; padding: .5rem .9rem; text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .4px; color: #888; font-weight: 600; white-space: nowrap; border-bottom: 1px solid #e0e0e0; }
td { padding: .6rem .9rem; border-top: 1px solid #f0f0f0; font-size: .82rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr:hover td { background: #fafafa; }
.tag { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: .7rem; font-weight: 500; }
.tag-blue  { background: #dbeafe; color: #1d4ed8; }
.tag-green { background: #dcfce7; color: #15803d; }
.tag-warn  { background: #fef3c7; color: #b45309; }
.tag-red   { background: #fee2e2; color: #b91c1c; }
.tag-cyan  { background: #cffafe; color: #0e7490; }
.tag-gray  { background: #f3f4f6; color: #6b7280; }
.del-btn { padding: 3px 9px; border-radius: 5px; font-size: .75rem; background: #fee2e2; color: #b91c1c; border: none; cursor: pointer; font-weight: 500; transition: all .12s; }
.del-btn:hover { background: #b91c1c; color: #fff; }
.pagination { display: flex; align-items: center; justify-content: space-between; padding: .6rem 1rem; border-top: 1px solid #f0f0f0; font-size: .78rem; color: #888; }
.page-btns { display: flex; gap: 3px; }
.page-btn { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 5px; border: 1px solid #e0e0e0; background: #fff; color: #555; cursor: pointer; font-size: .78rem; }
.page-btn:hover, .page-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
.page-btn:disabled { opacity: .4; cursor: default; }
.state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem; gap: .5rem; color: #aaa; text-align: center; }
.spinner { width: 20px; height: 20px; border: 2px solid #e0e0e0; border-top-color: #2563eb; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 999; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1.5rem; width: 90%; max-width: 460px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,.12); }
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-thumb { background: #e0e0e0; }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
.modal-title { font-size: .95rem; font-weight: 700; }
.close-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 1.1rem; line-height: 1; }
.close-btn:hover { color: #111; }
.form-group { margin-bottom: .85rem; }
.form-group label { display: block; font-size: .75rem; font-weight: 500; color: #666; margin-bottom: .3rem; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: .5rem .75rem; border: 1px solid #ddd; border-radius: 6px; font-size: .88rem; outline: none; transition: border-color .15s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #2563eb; }
.form-group textarea { resize: vertical; min-height: 75px; }
.modal-foot { display: flex; justify-content: flex-end; gap: .5rem; margin-top: 1.2rem; border-top: 1px solid #f0f0f0; padding-top: 1rem; }
.toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: .4rem; }
.toast { background: #fff; border: 1px solid #e0e0e0; border-radius: 7px; padding: .6rem 1rem; font-size: .83rem; box-shadow: 0 4px 12px rgba(0,0,0,.1); display: flex; align-items: center; gap: .5rem; animation: slideIn .2s ease; min-width: 220px; }
.toast.success { border-left: 3px solid #15803d; }
.toast.error   { border-left: 3px solid #b91c1c; }
@keyframes slideIn { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<section id="login-view">
  <div class="login-card">
    <h1><span>Trade</span>Link — Admin</h1>
    <div class="field">
      <label>Phone</label>
      <input type="text" id="log-phone" placeholder="0XXXXXXXXX" autocomplete="off" maxlength="10">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="log-pass" placeholder="••••••••">
    </div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-err"></div>
  </div>
</section>

<section id="app" style="display:none; width:100%; flex-direction:row;">
  <aside class="sidebar">
    <div class="sidebar-logo">TradeLink</div>
    <div class="nav-item active" data-tab="users" onclick="switchTab(this)">Users <span class="nav-badge" id="badge-users">—</span></div>
    <div class="nav-item" data-tab="posts" onclick="switchTab(this)">Posts <span class="nav-badge" id="badge-posts">—</span></div>
    <div class="nav-item" data-tab="services" onclick="switchTab(this)">Services <span class="nav-badge" id="badge-services">—</span></div>
    <div class="nav-item" data-tab="requests" onclick="switchTab(this)">Requests <span class="nav-badge" id="badge-requests">—</span></div>
    <div class="nav-item" data-tab="reviews" onclick="switchTab(this)">Reviews <span class="nav-badge" id="badge-reviews">—</span></div>
    <div class="sidebar-bottom">
      <div class="admin-name" id="admin-name">Admin</div>
      <div class="admin-role">Super Admin</div>
      <button class="btn btn-ghost" style="width:100%;margin-top:.6rem;" onclick="logout()">Logout</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="tab-title">Users</div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="loadData()">↻ Refresh</button>
        <button class="btn btn-primary" id="create-btn" onclick="openCreate()">+ Add User</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="state-box"><div class="spinner"></div></div>
    </div>
  </main>
</section>

<div class="overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Add</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save" onclick="saveModal()">Add</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
const API = 'http://localhost:3000';
let token = localStorage.getItem('tl_token');
let currentTab = 'users';
let allData = [], filteredData = [];
let page = 1;
const PAGE_SIZE = 15;
let currentSearch = '';

if (token) showApp();

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-view').style.display !== 'none') doLogin();
});

async function doLogin() {
  const phone = document.getElementById('log-phone').value.trim();
  const pass  = document.getElementById('log-pass').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  if (!phone || !pass) { showErr('Fill in all fields.'); return; }
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const res  = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password: pass })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.message || 'Login failed');
    if (data.user.role !== 'admin') throw new Error('Not an admin account');
    token = data.token;
    localStorage.setItem('tl_token', token);
    localStorage.setItem('tl_name', data.user.name || 'Admin');
    showApp();
  } catch (e) { showErr(e.message); }
  finally { btn.textContent = 'Sign In'; btn.disabled = false; }
}

function showErr(msg) { const el = document.getElementById('login-err'); el.textContent = msg; el.style.display = 'block'; }
function logout() { localStorage.clear(); location.reload(); }
function showApp() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('admin-name').textContent = localStorage.getItem('tl_name') || 'Admin';
  loadAll();
}

async function api(path, method = 'GET', body = null, auth = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (auth) headers['Authorization'] = 'Bearer ' + token;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API + path, opts);
}

function switchTab(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  currentTab = el.dataset.tab;
  page = 1; currentSearch = '';
  const labels = { users:'User', posts:'Post', services:'Service', requests:'Request', reviews:'Review' };
  document.getElementById('tab-title').textContent = capitalize(currentTab);
  document.getElementById('create-btn').textContent = '+ Add ' + (labels[currentTab] || '');
  loadData();
}

async function loadAll() {
  for (const t of ['users','posts','services','requests','reviews']) {
    try {
      const res = await api('/admin/' + t);
      if (res.ok) {
        const d = await res.json();
        const arr = Array.isArray(d) ? d : d[t] || d.results || Object.values(d).find(Array.isArray) || [];
        document.getElementById('badge-' + t).textContent = arr.length;
        if (t === 'users') { allData = arr; filteredData = [...arr]; renderContent(); }
      }
    } catch {}
  }
}

async function loadData() {
  setContent('<div class="state-box"><div class="spinner"></div></div>');
  try {
    const res = await api('/admin/' + currentTab);
    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      throw new Error('HTTP ' + res.status);
    }
    const raw = await res.json();
    allData = Array.isArray(raw) ? raw : raw[currentTab] || raw.results || Object.values(raw).find(Array.isArray) || [];
    filteredData = [...allData];
    page = 1;
    document.getElementById('badge-' + currentTab).textContent = allData.length;
    renderContent();
  } catch (e) {
    setContent('<div class="state-box" style="color:#b91c1c;"><div style="font-size:1.4rem">⚠️</div><strong>Could not load data</strong><span style="font-size:.8rem;color:#999">' + e.message + '</span></div>');
  }
}

function renderContent() {
  if (!filteredData.length) { setContent('<div class="state-box">No records found.</div>'); return; }
  const start = (page - 1) * PAGE_SIZE;
  const slice = filteredData.slice(start, start + PAGE_SIZE);
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  setContent('<div class="table-card"><div class="table-header"><span class="record-count">' + filteredData.length + ' record' + (filteredData.length !== 1 ? 's' : '') + '</span><div class="search-box"><span style="color:#aaa;font-size:.8rem">🔍</span><input type="text" placeholder="Search…" value="' + escHtml(currentSearch) + '" oninput="doSearch(this.value)" id="search-input"></div></div><div class="table-wrap"><table><thead><tr>' + getHeaders(slice[0]) + '</tr></thead><tbody>' + slice.map(r => getRow(r)).join('') + '</tbody></table></div><div class="pagination"><span>Showing ' + (start+1) + '–' + Math.min(start+PAGE_SIZE, filteredData.length) + ' of ' + filteredData.length + '</span><div class="page-btns">' + getPaginationHTML(totalPages) + '</div></div></div>');
}

function getHeaders(row) { return getCols(row).map(k => '<th>' + k + '</th>').concat('<th>Action</th>').join(''); }
function getCols(row) { const hide = new Set(['__v','password','images','tradesmanInfo','profilePic','updatedAt']); return Object.keys(row).filter(k => !hide.has(k)); }
function getRow(item) {
  const cols = getCols(item);
  const cells = cols.map(k => {
    let v = item[k];
    if (v === null || v === undefined || v === '') return '<td><span style="color:#ccc">—</span></td>';
    if (k === '_id') return '<td><code style="font-size:.7rem;color:#888">' + String(v).slice(-8) + '</code></td>';
    if (k === 'role') return '<td><span class="tag ' + roleTag(v) + '">' + v + '</span></td>';
    if (k === 'status') return '<td><span class="tag ' + statusTag(v) + '">' + v + '</span></td>';
    if (k === 'rating') return '<td>★ ' + v + '</td>';
    if (k === 'budget' || k === 'estimatedPrice') return '<td>DZD ' + v + '</td>';
    if (k === 'createdAt') return '<td style="color:#888">' + formatDate(v) + '</td>';
    if (typeof v === 'object') {
      if (Array.isArray(v)) return '<td><span class="tag tag-gray">' + v.length + ' item' + (v.length!==1?'s':'') + '</span></td>';
      if (v && v._id) return '<td style="color:#2563eb">' + (v.name || v._id) + '</td>';
      return '<td><span class="tag tag-gray">object</span></td>';
    }
    const s = String(v);
    return '<td title="' + escHtml(s) + '">' + escHtml(s.length > 40 ? s.slice(0,40)+'…' : s) + '</td>';
  });
  return '<tr>' + cells.join('') + '<td><button class="del-btn" onclick="doDelete(\'' + item._id + '\')">Delete</button></td></tr>';
}

function getPaginationHTML(total) {
  if (total <= 1) return '';
  const s = Math.max(1, page - 1), e = Math.min(total, page + 1);
  let html = '<button class="page-btn" onclick="goPage(' + (page-1) + ')" ' + (page===1?'disabled':'') + '>‹</button>';
  if (s > 1) html += '<button class="page-btn" onclick="goPage(1)">1</button>';
  if (s > 2) html += '<span style="padding:0 4px;color:#aaa">…</span>';
  for (let i = s; i <= e; i++) html += '<button class="page-btn' + (i===page?' active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  if (e < total - 1) html += '<span style="padding:0 4px;color:#aaa">…</span>';
  if (e < total) html += '<button class="page-btn" onclick="goPage(' + total + ')">' + total + '</button>';
  html += '<button class="page-btn" onclick="goPage(' + (page+1) + ')" ' + (page===total?'disabled':'') + '>›</button>';
  return html;
}

function goPage(p) { if (p < 1 || p > Math.ceil(filteredData.length / PAGE_SIZE)) return; page = p; renderContent(); setTimeout(() => { const si = document.getElementById('search-input'); if(si) si.value = currentSearch; }, 0); }
function doSearch(q) { currentSearch = q; const lq = q.toLowerCase(); filteredData = lq ? allData.filter(r => JSON.stringify(r).toLowerCase().includes(lq)) : [...allData]; page = 1; renderContent(); setTimeout(() => { const si = document.getElementById('search-input'); if(si) { si.value = q; si.focus(); } }, 0); }

const SCHEMAS = {
  users:    [{ key:'name', label:'Full Name', required:true }, { key:'phone', label:'Phone', required:true }, { key:'email', label:'Email', type:'email', required:true }, { key:'password', label:'Password', type:'password', required:true }, { key:'role', label:'Role', type:'select', opts:['customer','tradesman','admin'], required:true }, { key:'location', label:'Location' }],
  posts:    [{ key:'title', label:'Title', required:true }, { key:'description', label:'Description', type:'textarea' }],
  services: [{ key:'title', label:'Title', required:true }, { key:'description', label:'Description', type:'textarea', required:true }, { key:'budget', label:'Budget (DZD)', type:'number', required:true }],
  requests: [{ key:'estimatedPrice', label:'Estimated Price', type:'number', required:true }, { key:'message', label:'Message', type:'textarea' }, { key:'status', label:'Status', type:'select', opts:['pending','accepted','rejected'] }],
  reviews:  [{ key:'rating', label:'Rating (1-5)', type:'number', required:true }, { key:'comment', label:'Comment', type:'textarea' }],
};

function openCreate() {
  const labels = { users:'User', posts:'Post', services:'Service', requests:'Request', reviews:'Review' };
  document.getElementById('modal-title').textContent = 'Add ' + (labels[currentTab] || capitalize(currentTab));
  document.getElementById('modal-save').textContent = 'Add';
  const fields = SCHEMAS[currentTab] || [];
  document.getElementById('modal-body').innerHTML = fields.map(f => {
    let input = '';
    if (f.type === 'select') input = '<select name="' + f.key + '">' + f.opts.map(o => '<option value="' + o + '">' + o + '</option>').join('') + '</select>';
    else if (f.type === 'textarea') input = '<textarea name="' + f.key + '" rows="3"></textarea>';
    else input = '<input type="' + (f.type||'text') + '" name="' + f.key + '" ' + (f.required?'required':'') + '>';
    return '<div class="form-group"><label>' + f.label + (f.required?' <span style="color:#b91c1c">*</span>':'') + '</label>' + input + '</div>';
  }).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

async function saveModal() {
  const inputs = document.getElementById('modal-body').querySelectorAll('input,select,textarea');
  const body = {}; let valid = true;
  inputs.forEach(el => {
    if (el.value.trim()) body[el.name] = el.value.trim();
    if (el.required && !el.value.trim()) { el.style.borderColor='#b91c1c'; valid = false; }
    else el.style.borderColor = '';
  });
  if (!valid) { toast('Fill in required fields', 'error'); return; }
  const btn = document.getElementById('modal-save');
  btn.textContent = 'Adding…'; btn.disabled = true;
  try {
    if (currentTab !== 'users') throw new Error('Adding ' + currentTab + ' via admin not supported — use the app.');
    const res = await fetch(API + '/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error || err.message || 'HTTP ' + res.status); }
    toast('Added successfully', 'success');
    closeModal(); loadData();
  } catch (e) { toast(e.message, 'error'); }
  finally { btn.textContent = 'Add'; btn.disabled = false; }
}

async function doDelete(id) {
  if (!confirm('Delete this ' + currentTab.replace(/s$/, '') + '? This cannot be undone.')) return;
  try {
    const res = await api('/admin/' + currentTab + '/' + id, 'DELETE');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    toast('Deleted', 'success'); loadData();
  } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
function toast(msg, type) { const c = document.getElementById('toast-container'); const el = document.createElement('div'); el.className = 'toast ' + (type||'success'); el.textContent = msg; c.appendChild(el); setTimeout(() => el.remove(), 3000); }
function setContent(html) { document.getElementById('content').innerHTML = html; }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }); }
function roleTag(r)   { return { customer:'tag-blue', tradesman:'tag-cyan', admin:'tag-red' }[r] || 'tag-gray'; }
function statusTag(s) { return { pending:'tag-warn', accepted:'tag-green', rejected:'tag-red' }[(s||'').toLowerCase()] || 'tag-gray'; }
</script>
